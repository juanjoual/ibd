services:
  postgres:
    image: timescale/timescaledb-ha:pg18
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # ¡Usad contraseñas seguras en producción!
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      hadoopnet:
        ipv4_address: 172.28.1.33

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@ual.es
      PGADMIN_DEFAULT_PASSWORD: postgres # ¡Usad contraseñas seguras en producción!
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      hadoopnet:
        ipv4_address: 172.28.1.34

volumes:
  postgres-data:
  pgadmin-data:

networks:
  hadoopnet:
    external: true
    name: hadoop_hadoopnet
